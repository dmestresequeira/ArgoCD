apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/dmestresequeira/ArgoCD.git
    targetRevision: main
    path: apps-config/whoami

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
