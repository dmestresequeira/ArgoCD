apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: routing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dmestresequeira/ArgoCD
    path: routing
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy: {}
  syncWave: 1

