apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default

  sources:
  - repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: 28.0.0
    helm:
      releaseName: traefik-traefik-system
      values: |
        deployment:
          enabled: true
          replicas: 2

        service:
          enabled: true
          type: NodePort
          spec:
            externalTrafficPolicy: Cluster
          ports:
            web:
              port: 80
              nodePort: 30080
            websecure:
              port: 443
              nodePort: 30443

        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
            ingressClass: traefik

        metrics:
          prometheus:
            enabled: true
            entryPoint: metrics
            addEntryPointsLabels: true
            addServicesLabels: true

        ports:
          web:
            port: 80
            protocol: TCP
          websecure:
            port: 443
            protocol: TCP

        logs:
          general:
            level: INFO
          access:
            enabled: true

  - repoURL: https://github.com/dmestresequeira/ArgoCD.git
    targetRevision: main
    ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
