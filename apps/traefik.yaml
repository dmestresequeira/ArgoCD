deployment:
  enabled: true
  replicas: 2

service:
  enabled: true
  type: NodePort
  spec:
    externalTrafficPolicy: Cluster
  ports:
    web:
      port: 80
      nodePort: 30080
    websecure:
      port: 443
      nodePort: 30443

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

metrics:
  prometheus:
    enabled: true
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true

ports:
  web:
    port: 80
    expose: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 443
    expose: true
    exposedPort: 443
    protocol: TCP

logs:
  general:
    level: INFO
  access:
    enabled: true
